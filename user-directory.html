<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 40px 20px;
        }

        #app {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            padding: 20px;
        }

        #error {
            background-color: #fdecea;
            color: #c0392b;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
        }

        #users-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .user-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .user-card h2 {
            color: #3498db;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .user-card p {
            color: #555;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>User Directory</h1>
        <div id="loading">Loading...</div>
        <div id="error" class="hidden"></div>
        <div id="users-container"></div>
    </div>

    <script src="user-directory.js"></script>
</body>
</html>
